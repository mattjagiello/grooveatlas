kind = "video"
previewPath = "/groove-atlas-video/"
title = "Groove Atlas — Hackathon Pitch Video"
version = "1.0.0"
id = "artifacts/groove-atlas-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/groove-atlas-video/" ]
localPort = 22737

[services.development]
run = "pnpm --filter @workspace/groove-atlas-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/groove-atlas-video", "run", "build" ]
publicDir = "artifacts/groove-atlas-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22737"
BASE_PATH = "/groove-atlas-video/"
