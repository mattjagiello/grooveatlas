kind = "slides"
previewPath = "/groove-atlas-deck/"
title = "Groove Atlas — Hackathon Pitch Deck"
version = "1.0.0"
id = "artifacts/groove-atlas-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/groove-atlas-deck/" ]
localPort = 25697

[services.development]
run = "pnpm --filter @workspace/groove-atlas-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/groove-atlas-deck", "run", "build" ]
publicDir = "artifacts/groove-atlas-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25697"
BASE_PATH = "/groove-atlas-deck/"
