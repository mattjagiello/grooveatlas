kind = "mobile"
previewPath = "/"
title = "Groove Atlas"
version = "1.0.0"
id = "artifacts/groove-atlas"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21867

[services.development]
run = "pnpm --filter @workspace/groove-atlas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/groove-atlas", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/groove-atlas", "run", "serve" ]

[services.env]
PORT = "21867"
BASE_PATH = "/"
